apiVersion: v1
kind: Service
metadata:
  name: opensearch-node
spec:
  ports:
  - port: 9200
    targetPort: 9200
    protocol: TCP
    name: api
  - port: 9600
    targetPort: 9600
    protocol: TCP
    name: performance
  selector:
    app: opensearch-node
  clusterIP: None

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-node
spec:
  selector:
    matchLabels:
      app: opensearch-node
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: opensearch-node
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
      # The hostpath provisioner does not reliably apply fsGroup ownership, so make
      # the persistent data dir writable by the opensearch user (uid 1000).
      - name: fix-data-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 1000:1000 /usr/share/opensearch/data"]
        volumeMounts:
        - name: opensearch-data
          mountPath: /usr/share/opensearch/data
      containers:
      - image: opensearchproject/opensearch:latest
        name: opensearch-node
        env:
          # Use secret in real usage
        - name: cluster.name
          value: "opensearch-cluster"
        - name: node.name
          value: "opensearch-node"
        - name: discovery.seed_hosts
          value: "opensearch-node"
        - name: cluster.initial_cluster_manager_nodes
          value: "opensearch-node"
        - name: bootstrap.memory_lock
          value: "false"
        - name: OPENSEARCH_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
          value: {{ .Values.opensearch.initialAdminPassword }}
        ports:
        - containerPort: 9200
          name: api
        - containerPort: 9600
          name: performance
        volumeMounts:
        - name: opensearch-tmp
          mountPath: /tmp
        - name: opensearch-data
          mountPath: /usr/share/opensearch/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
            ephemeral-storage: "5Gi"
          limits:
            memory: "2Gi"
            cpu: "1000m"
            ephemeral-storage: "10Gi"
      volumes:
      - name: opensearch-tmp
        emptyDir:
          sizeLimit: "5Gi"
      - name: opensearch-data
        persistentVolumeClaim:
          claimName: opensearch-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opensearch-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.opensearch.dataSize | default "10Gi" }}
